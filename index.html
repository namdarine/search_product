<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Excel Files</title>
    <script>
        async function fetchLatestFile() {
            const response = await fetch('https://api.github.com/repos/namdarine/search_product/contents/output');
            const files = await response.json();
            const excelFiles = files.filter(file => file.name.endsWith('.xlsx'));

            if (excelFiles.length > 0) {
                // 가장 최근 파일을 기준으로 정렬
                const latestFile = excelFiles.reduce((prev, current) => {
                    return (new Date(prev.commit.committer.date) > new Date(current.commit.committer.date)) ? prev : current;
                });
                
                // 다운로드 URL 설정
                const downloadUrl = `https://raw.githubusercontent.com/namdarine/search_product/main/output/${latestFile.name}`;
                
                // 링크 업데이트
                const linkElement = document.getElementById('latestFileLink');
                linkElement.href = downloadUrl;
                linkElement.innerText = ` ${latestFile.name} 파일을 다운로드하세요`;
                linkElement.setAttribute('download', latestFile.name); // 다운로드 속성 추가
            } else {
                document.getElementById('latestFileLink').innerText = "엑셀 파일이 없습니다.";
            }
        }

        window.onload = fetchLatestFile; // 페이지 로드 시 파일 목록 가져오기
    </script>
</head>
<body>
    <h1>최신 엑셀 파일 다운로드</h1>
    <p><a id="latestFileLink" href="#" download>여기를 클릭하여 최신 엑셀 파일을 다운로드하세요</a></p>
</body>
</html>
