<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Excel Files</title>
</head>
<body>
    <h1>최신 엑셀 파일 다운로드</h1>
    <p id="downloadLink">파일 정보를 불러오는 중입니다...</p>

    <script>
        // JSON 파일에서 업데이트 날짜를 로드하는 함수
        fetch('output/update_date.json')
            .then(response => response.json())
            .then(data => {
                const updateDate = data.updateDate; // 업데이트 날짜 가져오기
                const fileName = `Scotty Products_${updateDate}.xlsx`;
                
                // 다운로드 링크 설정
                document.getElementById('downloadLink').innerHTML = `<a href="output/${fileName}" download>여기를 클릭하여 최신 엑셀 파일을 다운로드하세요</a>`;
            })
            .catch(error => {
                console.error('파일 정보를 가져오는 데 오류가 발생했습니다:', error);
                document.getElementById('downloadLink').innerText = '파일 정보를 불러오지 못했습니다.';
            });
    </script>
</body>
</html>
